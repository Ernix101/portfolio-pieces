{% extends "base.html" %}
{% load static %}

{% block content %}
    <main class="other-pages">
        <div class="contact-wrapper">
            <div class="contact-image-side">
                <img src="{% static 'pics/customer-care.png' %}" alt="Customer agent">
            </div>
            <div class="contact-form-side">
                <h1>Contact Us</h1>
                <p>We'd love to hear from you. Make a reservation or send us a message.</p>
                <form method="POST">
                    {% csrf_token %}
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Your email" required>

                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="5" placeholder="Your Message" ></textarea>

                    <input type="submit" value="Send Message">
                </form>
            </div>
        </div>
    </main>
    
{% endblock content %}
