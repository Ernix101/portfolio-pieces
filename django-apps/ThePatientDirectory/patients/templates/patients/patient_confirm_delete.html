{% extends "patients/base.html" %}
{% load static %}

{% block title %}Delete Patient{% endblock %}

{% block content %}

    <div class="delete-wrapper">
        <h1>Delete {{ patient.name }}?</h1>
        <p>This action cannot be undone.</p>

        <form method="POST">
            {% csrf_token %}
            <button class="btn" type="submit">Yes, Delete</button>
        </form>
        
        <a class="cancel-btn" href="{% url 'patient_list' %}">Cancel</a>
    </div>
    
    
{% endblock content %}
